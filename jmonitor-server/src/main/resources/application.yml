spring:
  application:
    name: jmonitor

server:
  port: 8080

jmonitor:
  # How often subscribed JVMs are sampled and pushed over WebSocket (ms).
  sample-interval-ms: 1000
  # Number of recent samples kept per process in the in-memory ring buffer.
  history-size: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
