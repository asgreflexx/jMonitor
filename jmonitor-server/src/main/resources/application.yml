spring:
  application:
    name: jmonitor
  datasource:
    url: jdbc:h2:file:${user.home}/.jmonitor/db/jmonitor;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always

server:
  port: 8080

jmonitor:
  # How often subscribed JVMs are sampled and pushed over WebSocket (ms).
  sample-interval-ms: 1000
  # Number of recent samples kept per process in the in-memory ring buffer.
  history-size: 300
  # Directory for the RRD4J time-series files (one .rrd per pid).
  data-dir: ${user.home}/.jmonitor/rrd

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
